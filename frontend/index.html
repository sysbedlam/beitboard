<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeitBoard — beit24.ru</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Unbounded:wght@200;400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="/gridstack.min.css"/>
<style>
:root {
  --bg:#f0f2f5; --surface:#fff; --surface2:#f5f7fa;
  --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.13);
  --text:#1a1d24; --muted:#8a909e;
  --accent:#1a7fc1; --accent2:#1a9c6e; --accent3:#d4840a; --accent4:#7c4fc4; --danger:#c93535;
  --grid-line:rgba(0,0,0,0.04); --shadow:0 1px 4px rgba(0,0,0,0.07);
}
[data-theme="dark"] {
  --bg:#0d0f12; --surface:#141720; --surface2:#1c2030;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.12);
  --text:#e8eaf0; --muted:#5a6070;
  --accent:#4fc3f7; --accent2:#81e6b0; --accent3:#ffb347; --accent4:#cf9fff; --danger:#ff6b6b;
  --grid-line:rgba(79,195,247,0.03); --shadow:0 1px 6px rgba(0,0,0,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;min-height:100vh;padding:20px;transition:background .25s,color .25s;}
.grid-bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.wrapper{position:relative;z-index:1;max-width:1400px;margin:0 auto;}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
.logo{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;font-weight:800;font-size:22px;letter-spacing:6px;text-transform:uppercase;background:linear-gradient(90deg,#38bdf8,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-by{font-size:10px;letter-spacing:2px;color:var(--muted);font-weight:400;-webkit-text-fill-color:var(--muted);background:none;text-decoration:none;transition:color .15s;}
.logo-by:hover{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:10px;}
#clock{font-size:20px;font-weight:400;color:var(--text);letter-spacing:2px;}
#date{font-size:10px;color:var(--muted);letter-spacing:1px;text-align:right;}
.hdr-btn{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.hdr-btn:hover{color:var(--text);border-color:var(--accent);}
.hdr-btn.active{border-color:var(--accent);color:var(--accent);background:var(--surface2);}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--accent2);flex-shrink:0;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* Search */
.search-wrap{margin-bottom:14px;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:0 14px;height:42px;transition:border-color .15s,box-shadow .15s;}
.search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,127,193,.1);}
.search-box input{flex:1;border:none;outline:none;background:transparent;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);}
.search-box input::placeholder{color:var(--muted);}
.search-box kbd{font-size:10px;color:var(--muted);border:1px solid var(--border2);border-radius:4px;padding:2px 5px;font-family:'JetBrains Mono',monospace;}

/* GridStack overrides */
.grid-stack{background:transparent;}
.grid-stack-item-content{border-radius:12px;overflow:hidden;}
.grid-stack .grid-stack-item-content{background:transparent;}

/* Edit mode grid placeholder */
.edit-mode .grid-stack-item>.grid-stack-item-content{outline:1px dashed var(--border2);}
.grid-stack-item.ui-draggable-dragging>.grid-stack-item-content{box-shadow:0 8px 32px rgba(0,0,0,.18);opacity:.92;}

/* Widget shell */
.widget{background:var(--surface);border:1px solid var(--border);border-radius:12px;height:100%;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow);transition:border-color .15s;}
.widget-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;user-select:none;}
.widget-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.widget-title{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--muted);flex:1;}
.widget-actions{display:flex;gap:4px;align-items:center;}
.widget-actions .w-btn{display:none;}
.edit-mode .widget-actions .w-btn{display:inline-block;}
.w-btn{background:none;border:1px solid var(--border2);border-radius:5px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);padding:2px 6px;transition:all .12s;line-height:1.4;}
.w-btn:hover{color:var(--text);border-color:var(--text);}
.w-btn.del:hover{color:var(--danger);border-color:var(--danger);}
.widget-body{flex:1;overflow-y:auto;min-height:0;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.widget-body::-webkit-scrollbar{width:4px;}
.widget-body::-webkit-scrollbar-track{background:transparent;}
.widget-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.widget-body::-webkit-scrollbar-thumb:hover{background:var(--muted);}
.widget-body::-webkit-scrollbar-button{display:none;}

/* Section widget */
.c-accent .widget-dot{background:var(--accent);}
.c-accent2 .widget-dot{background:var(--accent2);}
.c-accent3 .widget-dot{background:var(--accent3);}
.c-accent4 .widget-dot{background:var(--accent4);}
.c-danger .widget-dot{background:var(--danger);}
.c-accent a.link-item:hover{border-left-color:var(--accent);}
.c-accent a.link-item:hover .link-icon{color:var(--accent);}
.c-accent2 a.link-item:hover{border-left-color:var(--accent2);}
.c-accent2 a.link-item:hover .link-icon{color:var(--accent2);}
.c-accent3 a.link-item:hover{border-left-color:var(--accent3);}
.c-accent3 a.link-item:hover .link-icon{color:var(--accent3);}
.c-accent4 a.link-item:hover{border-left-color:var(--accent4);}
.c-accent4 a.link-item:hover .link-icon{color:var(--accent4);}
.c-danger a.link-item:hover{border-left-color:var(--danger);}
.c-danger a.link-item:hover .link-icon{color:var(--danger);}

.links{padding:4px 0;}
a.link-item{display:flex;align-items:center;gap:9px;padding:8px 14px;text-decoration:none;color:var(--text);transition:background .12s;border-left:2px solid transparent;}
a.link-item:hover{background:var(--surface2);}
.edit-mode .link-icon{cursor:pointer;}
.edit-mode .link-icon:hover{outline:2px solid var(--accent);}
.link-icon{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;background:var(--surface2);color:var(--muted);font-weight:500;transition:color .12s;overflow:hidden;}
.link-name{font-size:12px;color:var(--text);flex:1;}
.link-url{font-size:10px;color:var(--muted);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.link-status{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:transparent;margin-left:4px;transition:background .3s;}
.link-status.online{background:#22c55e;}
.link-status.offline{background:var(--danger);}
.link-drag{display:none;cursor:grab;color:var(--muted);font-size:14px;padding:0 4px;user-select:none;flex-shrink:0;}
.link-drag:active{cursor:grabbing;}
.edit-mode .link-drag{display:block;}
.link-item.drag-over{background:var(--surface2);border-left-color:var(--accent);}
.link-item.dragging{opacity:0.4;}
/* Icon picker */
.icon-picker{display:none;position:fixed;z-index:500;background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:12px;width:280px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.icon-picker input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);outline:none;margin-bottom:8px;}
.icon-picker input:focus{border-color:var(--accent);}
.icon-results{display:flex;flex-wrap:wrap;gap:6px;max-height:180px;overflow-y:auto;}
.icon-result{width:36px;height:36px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--surface2);padding:4px;transition:background .12s;}
.icon-result:hover{background:var(--surface2);outline:2px solid var(--accent);}
.icon-result img{width:24px;height:24px;object-fit:contain;}
.icon-picker-empty{font-size:11px;color:var(--muted);padding:8px 0;}

.link-edit{display:none;background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:0 2px;line-height:1;transition:color .12s;}
.edit-mode .link-edit{display:block;}
.link-edit:hover{color:var(--accent);}
.link-del{display:none;background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:0 2px;line-height:1;transition:color .12s;}
.edit-mode .link-del{display:block;}
.link-del:hover{color:var(--danger);}


.add-link-row{display:none;padding:8px 12px;border-top:1px solid var(--border);gap:5px;}
.edit-mode .add-link-row{display:flex;}
.add-link-row input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);outline:none;min-width:0;}
.add-link-row input:focus{border-color:var(--accent);}
.add-link-row button{background:var(--accent);border:none;border-radius:6px;padding:5px 9px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#fff;cursor:pointer;white-space:nowrap;}

/* Weather widget */
.weather-body{padding:16px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;height:100%;}
.weather-temp{font-size:36px;font-weight:300;color:var(--accent);line-height:1;}
.weather-info{display:flex;flex-direction:column;gap:3px;}
.weather-desc{font-size:12px;color:var(--muted);}
.weather-city{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:200;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
.weather-details{display:flex;gap:16px;margin-left:auto;flex-wrap:wrap;}
.weather-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.weather-item .wlabel{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.weather-item .wval{font-size:13px;color:var(--text);}
.weather-refresh{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;margin-left:8px;transition:color .12s;}
.weather-refresh:hover{color:var(--accent);}

/* Calendar */
.cal-body{padding:10px 12px 12px;}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-month{font-size:12px;font-weight:500;color:var(--text);}
.cal-nav-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;line-height:1;padding:0 4px;transition:color .12s;}
.cal-nav-btn:hover{color:var(--text);}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px;}
.cal-day-name{text-align:center;font-size:9px;color:var(--muted);padding:2px 0;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{text-align:center;font-size:11px;padding:4px 2px;border-radius:5px;color:var(--text);}
.cal-day.empty{color:transparent;}
.cal-day.today{background:var(--accent);color:#fff;font-weight:500;}
.cal-day.weekend:not(.today){color:var(--danger);}

/* Notes */
.notes-textarea{width:100%;height:100%;min-height:80px;resize:none;background:var(--surface);border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);padding:11px 14px;line-height:1.7;}
.notes-textarea::placeholder{color:var(--muted);}

/* Todos */
.todo-input-row{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.todo-input{flex:1;background:var(--surface);border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);padding:8px 12px;}
.todo-input::placeholder{color:var(--muted);}
.todo-add-btn{background:none;border:none;border-left:1px solid var(--border);padding:0 12px;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;transition:color .12s;}
.todo-add-btn:hover{color:var(--accent2);}
#todo-list{overflow-y:auto;flex:1;}
.todo-item{display:flex;align-items:center;gap:8px;padding:7px 12px;transition:background .1s;}
.todo-item:hover{background:var(--surface2);}
.todo-cb{appearance:none;width:13px;height:13px;border:1px solid var(--border2);border-radius:3px;cursor:pointer;flex-shrink:0;transition:all .1s;position:relative;}
.todo-cb:checked{background:var(--accent2);border-color:var(--accent2);}
.todo-cb:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;}
.todo-text{flex:1;font-size:12px;color:var(--text);}
.todo-text.done{text-decoration:line-through;color:var(--muted);}
.todo-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;opacity:0;transition:opacity .1s,color .1s;line-height:1;}
.todo-item:hover .todo-del{opacity:1;}
.todo-del:hover{color:var(--danger);}
.todo-empty{padding:12px;font-size:11px;color:var(--muted);text-align:center;}

/* Add section */


.add-section-btn{display:none;width:100%;background:var(--surface);border:1px dashed var(--border2);border-radius:12px;padding:14px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-align:center;transition:all .15s;letter-spacing:1px;margin-top:12px;}
.edit-mode .add-section-btn{display:block;}
.float-bar{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:500;background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:8px 12px;box-shadow:0 8px 32px rgba(0,0,0,.4);align-items:center;gap:8px;}
.edit-mode .float-bar{display:flex;}
.add-section-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Add widget menu */
.add-menu-label{padding:6px 12px 4px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'Unbounded',sans-serif;}
.add-menu-sep{height:1px;background:var(--border);margin:4px 0;}
.add-menu-item{padding:8px 12px;font-size:12px;color:var(--text);cursor:pointer;border-radius:6px;transition:background .1s;white-space:nowrap;}
.add-menu-item:hover{background:var(--surface2);}



/* City search */
.city-results{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:8px;margin-top:4px;z-index:100;overflow:hidden;}
.city-result{padding:8px 12px;font-size:12px;cursor:pointer;color:var(--text);transition:background .1s;}
.city-result:hover{background:var(--surface2);}
.city-result small{color:var(--muted);margin-left:6px;font-size:10px;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:24px;width:340px;max-width:95vw;}
.modal h3{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
.modal label{display:block;font-size:10px;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;}
.modal input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);outline:none;margin-bottom:12px;}
.modal input:focus{border-color:var(--accent);}
.color-opts{display:flex;gap:8px;margin-bottom:14px;}
.color-opt{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .12s;}
.color-opt.selected{border-color:var(--text);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn-cancel{background:none;border:1px solid var(--border2);border-radius:7px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;}
.btn-cancel:hover{border-color:var(--text);color:var(--text);}
.btn-ok{background:var(--accent);border:none;border-radius:7px;padding:7px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#fff;cursor:pointer;}
.btn-ok:hover{opacity:.85;}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="wrapper">

<header>
  <div style="display:flex;flex-direction:column;gap:2px;">
    <div class="logo">BeitBoard</div>
    <a class="logo-by" href="https://beit24.ru" target="_blank">by beit24.ru</a>
  </div>
  <div class="header-right">
    <button class="hdr-btn" id="edit-btn" onclick="toggleEdit()">✏ EDIT</button>
    <button class="hdr-btn" onclick="checkAllHosts()" title="Проверить доступность">◉ СТАТУС</button>
    <div class="add-widget-wrap" id="add-widget-wrap" style="display:none;position:relative;">
      <button class="hdr-btn active" onclick="toggleHeaderAddMenu()">＋ ДОБАВИТЬ</button>
      <div class="add-menu" id="add-menu" style="display:none;position:absolute;top:110%;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:6px;z-index:200;min-width:190px;box-shadow:0 4px 16px rgba(0,0,0,.15);">
        <div class="add-menu-label">Секция</div>
        <div class="add-menu-item" onclick="document.getElementById('add-menu').style.display='none';openAddSection()">📁 Новая секция</div>
        <div class="add-menu-sep"></div>
        <div class="add-menu-label">Виджеты</div>
        <div class="add-menu-item" onclick="addSystemWidget('weather','Погода')">🌤 Погода</div>
        <div class="add-menu-item" onclick="addSystemWidget('calendar','Календарь')">📅 Календарь</div>
        <div class="add-menu-item" onclick="addSystemWidget('notes','Заметки')">📝 Заметки</div>
        <div class="add-menu-item" onclick="addSystemWidget('todos','Задачи')">✅ Задачи</div>
        <div id="plugin-menu-items"></div>
      </div>
    </div>
    <button class="hdr-btn" onclick="toggleTheme()">
      <span id="theme-icon">☀</span><span id="theme-label">LIGHT</span>
    </button>
    <div>
      <div id="clock">--:--:--</div>
      <div id="date">...</div>
    </div>
    <div class="status-dot"></div>
  </div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" placeholder="Поиск в Google..." autocomplete="off"/>
    <kbd>Enter</kbd>
  </div>
</div>

<div id="welcome-msg" style="display:none;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;color:var(--muted);">
  <div style="font-size:40px;margin-bottom:16px;">👋</div>
  <div style="font-family:'Unbounded',sans-serif;font-size:12px;letter-spacing:3px;margin-bottom:10px;color:var(--text)">ДОБРО ПОЖАЛОВАТЬ В BEITBOARD</div>
  <div style="font-size:12px;">Нажми <strong style="color:var(--accent)">✏ EDIT</strong> затем <strong style="color:var(--accent)">＋ ДОБАВИТЬ</strong> чтобы начать</div>
</div>
<div class="grid-stack" id="grid"></div>
<button class="add-section-btn" onclick="openAddSection()">＋ добавить секцию</button>


</div>

<!-- Icon picker -->
<div class="icon-picker" id="icon-picker">
  <input type="text" id="icon-search" placeholder="Поиск иконки... (keenetic, nginx...)" autocomplete="off"/>
  <div class="icon-results" id="icon-results">
    <span class="icon-picker-empty">Введите название сервиса</span>
  </div>
</div>

function applyTheme(t) {

  document.getElementById('theme-label').textContent = t==='dark'?'DARK':'LIGHT';

// ── Clock ──────────────────────────────────────────────
function updateClock(){
  const n=new Date(), p=x=>String(x).padStart(2,'0');
  document.getElementById('clock').textContent=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
  const days=['вс','пн','вт','ср','чт','пт','сб'],mo=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

// ── API ────────────────────────────────────────────────
async function api(method, path, body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body) opts.body=JSON.stringify(body);
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 8000); // 8 сек таймаут
  try {
    const r = await fetch(API+path, {...opts, signal: controller.signal});
    clearTimeout(timer);
    return r.json();
  } catch(e) {
    clearTimeout(timer);
    if(e.name === 'AbortError') console.warn('API timeout:', path);
    throw e;
  }
}

async function loadWeatherWidget(wid){

  try{
    // Берём конфиг виджета из data-атрибута

    const lat = cfg.lat || '45.0448';
    const lon = cfg.lon || '38.9760';
    const city = cfg.city || 'Краснодар';
    const c=await api('GET',`/api/weather?lat=${lat}&lon=${lon}&city=${encodeURIComponent(city)}`);
    if(c.error){el.innerHTML=`<span style="color:var(--muted);padding:16px;display:block">нет данных</span>`;return;}
    el.innerHTML=`
      <div class="weather-body">
        <div class="weather-temp">${Math.round(c.temperature_2m)}°</div>
        <div class="weather-info">

        </div>

          <div class="weather-item"><span class="wlabel">ощущается</span><span class="wval">${Math.round(c.apparent_temperature)}°</span></div>

// ── Calendar ───────────────────────────────────────────
let calDate=new Date();
function calNav(d){calDate=new Date(calDate.getFullYear(),calDate.getMonth()+d,1);renderCal();}

function renderCal(){ document.querySelectorAll('[id^="cal-body-"]').forEach(el=>renderCalWidget(el.id.replace('cal-body-',''))); }
function renderCalWidget(wid){
  wid=wid||'calendar';
  const el=document.getElementById('cal-body-'+wid); if(!el) return;
  const today=new Date(),y=calDate.getFullYear(),m=calDate.getMonth();
  const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  let dow=first.getDay(); if(dow===0) dow=7;
  let days='';
  for(let i=1;i<dow;i++) days+=`<div class="cal-day empty">.</div>`;
  for(let d=1;d<=last.getDate();d++){
    const wd=new Date(y,m,d).getDay();
    const cls=(wd===0||wd===6)?'weekend':'';
    const tod=(d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear())?'today':'';
    days+=`<div class="cal-day ${cls} ${tod}">${d}</div>`;
  }
  el.innerHTML=`
    <div class="cal-nav-row">
      <button class="cal-nav-btn" onclick="calNav(-1)">&#8249;</button>
      <div class="cal-month">${months[m]} ${y}</div>
      <button class="cal-nav-btn" onclick="calNav(1)">&#8250;</button>
    </div>
    <div class="cal-days-header">
      <div class="cal-day-name">пн</div><div class="cal-day-name">вт</div><div class="cal-day-name">ср</div>
      <div class="cal-day-name">чт</div><div class="cal-day-name">пт</div>

      <div class="cal-day-name" style="color:var(--danger)">вс</div>
    </div>
    <div class="cal-days">${days}</div>`;
}

// ── Build widgets HTML ─────────────────────────────────
function isLocalUrl(url) {
  try {
    const h = new URL(url).hostname;
    return h.startsWith('192.168.') || h.startsWith('10.') || 
           h.startsWith('172.') || h === 'localhost' || h.endsWith('.lan');
  } catch { return false; }
}

function loadFavicons(links) {
  links.forEach(l => {
    const el = document.getElementById('icon-' + l.id);
    if (!el) return;
    // Если иконка выбрана из пака — используем её
    if (l.icon && !l.icon.match(/^[A-Z]{2}$/)) {
      el.innerHTML = `<img src="/api/icons/${l.icon}.png" width="16" height="16"
        style="border-radius:2px;display:block;"
        onerror="this.style.display='none'">`;
      return;
    }
    const url = l.url;
    const domain = getDomain(url);
    const base = url.replace(/\/$/, '').split('/').slice(0,3).join('/');

    function tryImg(src, onFail) {
      const img = document.createElement('img');
      img.width = 16; img.height = 16;
      img.style.cssText = 'border-radius:2px;display:block;';
      img.onload = () => { el.innerHTML = ''; el.appendChild(img); };
      img.onerror = onFail || (() => {});
      img.src = src;
    }

    if (isLocalUrl(url)) {
      // Локальные: сначала напрямую /favicon.ico, потом Flask парсит HTML
      tryImg(base + '/favicon.ico', () => {
        // Flask парсит HTML страницы с полным base URL включая порт
        tryImg('/api/favicon?domain=' + encodeURIComponent(domain) + '&url=' + encodeURIComponent(base));
      });
    } else {
      // Внешние: Flask с кэшем и парсингом HTML
      tryImg('/api/favicon?domain=' + encodeURIComponent(domain));
    }
  });
}

function getDomain(url){
  try{
    const u = new URL(url);
    return (u.hostname + (u.port ? ':'+u.port : '')).replace(/^www\./,'');
  } catch{ return url; }
}

function shortUrl(url){
  try{const u=new URL(url);return u.hostname+(u.port?':'+u.port:'')+(u.pathname!=='/'?u.pathname.slice(0,10):'');}
  catch{return url.slice(0,20);}
}

async function initDashboard() {
  const initData = await api('GET','/api/init');
  const sections = initData.sections;
  const widgetsData = initData.widgets;

  const wMap={};
  widgetsData.forEach(w=>wMap[w.id]=w);

  grid=GridStack.init({
    column:12,
    cellHeight:60,
    margin:8,
    animate:true,
    staticGrid:true,        // двигаем только в режиме edit
    resizable:{handles:'se,sw,ne,nw,e,w'},
    draggable:{handle:'.widget-header'},
  },'#grid');

  // Системные виджеты
  const systemWidgets=[
    {id:'weather',  build:buildWeatherWidget,  label:'Погода'},
    {id:'calendar', build:buildCalendarWidget, label:'Календарь'},
    {id:'notes',    build:buildNotesWidget,    label:'Заметки'},
    {id:'todos',    build:buildTodosWidget,    label:'Задачи'},
  ];

    // Фиксированные системные виджеты
  systemWidgets.forEach(({id,build,label})=>{
    const w=wMap[id];
    if(!w) return;
    grid.addWidget({
      id, x:w.x, y:w.y, w:w.w, h:w.h, minW:w.min_w||2, minH:w.min_h||2,
      content:build(id)
    });
  });

  // Динамические виджеты (добавленные через + ВИДЖЕТ)
  const pluginInits = []; // отложенные init() плагинов
  widgetsData.forEach(w=>{
    if(!w.type) return;
    if(['weather','calendar','notes','todos'].includes(w.id)) return;
    const config = w.config ? JSON.parse(w.config) : {};

    // Сначала ищем в плагинах, потом в widgetBuilders
    const pluginDef = Dashboard.widgets[w.type];
    if(pluginDef) {
      grid.addWidget({
        id:w.id, x:w.x, y:w.y, w:w.w, h:w.h,
        minW:w.min_w||pluginDef.minW, minH:w.min_h||pluginDef.minH,
        content:pluginDef.build(w.id, config)
      });
      pluginInits.push({def: pluginDef, wid: w.id, config});
      return;
    }

    const cfg=widgetBuilders[w.type];
    if(!cfg) return;
    grid.addWidget({
      id:w.id, x:w.x, y:w.y, w:w.w, h:w.h, minW:w.min_w||cfg.minW, minH:w.min_h||cfg.minH,
      content:cfg.build(w.id)
    });
    setTimeout(()=>{
      const el=document.getElementById('widget-'+w.id);
      if(el && w.config) el.dataset.config=w.config;
    },50);
  });

  // Фиксированные системные виджеты — устанавливаем конфиг из БД
  widgetsData.forEach(w=>{
    if(!w.config) return;
    setTimeout(()=>{
      const el=document.getElementById('widget-'+w.id);
      if(el) el.dataset.config=w.config;
    },50);
  });

  // Секции
  sections.forEach(s=>{
    const wid=`section-${s.id}`;

    const w=wMap[wid]||s.widget||{x:0,y:0,w:3,h:4,min_w:1,min_h:2};
    grid.addWidget({
      id:wid, x:w.x, y:w.y, w:w.w, h:w.h, minW:w.min_w||1, minH:w.min_h||2,
      content:buildSectionWidget(s)
    });
  });

  grid.on('change', schedSave);

  // Пустой дашборд — подсказка
  // Показываем приветствие только если реально пусто
  setTimeout(() => {
    const welcomeEl = document.getElementById('welcome-msg');
    if (!welcomeEl) return;
    const hasItems = grid.engine.nodes.length > 0;
    welcomeEl.style.display = hasItems ? 'none' : 'flex';
  }, 300);
  // Скрываем приветствие при добавлении первого элемента
  grid.on('added', () => {
    const welcomeEl = document.getElementById('welcome-msg');
    if (welcomeEl) welcomeEl.style.display = 'none';
  });

  // Загружаем данные во все виджеты
  setTimeout(()=>{
    // Фавиконы для всех секций
    sections.forEach(s => loadFavicons(s.links));
    loadWeather();
    renderCal();
    document.querySelectorAll('[id^="notes-area-"]').forEach(el => { el.value = initData.notes || ''; });
    renderAllTodos(initData.todos);
    // Инициализируем динамические виджеты
    widgetsData.forEach(w => {
      if(!w.type || systemWidgets && systemWidgets.find(s=>s.id===w.id)) return;
      if(w.type==='weather') { loadWeatherWidget(w.id); addWeatherSettingsBtn(w.id); }
      if(w.type==='calendar') renderCalWidget(w.id);
      if(w.type==='notes') loadNotesWidget(w.id);
      if(w.type==='todos') loadTodosWidget(w.id);
    });
    // Инициализируем плагин-виджеты
    pluginInits.forEach(({def, wid, config}) => {
      def.init && def.init(wid, config);
    });
  }, 100);
}

function openModal(title,showColor,showUrl,showName,name,url,color,cb){
  document.getElementById('modal-title').textContent=title;

  document.getElementById('modal-name').style.display=showName?'block':'none';
  document.getElementById('modal-url').value=url||'';

  document.querySelectorAll('.color-opt').forEach(el=>el.classList.toggle('selected',el.dataset.color===selColor));
  modalCb=cb;
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-name').focus(),50);
}

// ── Link drag & drop ──────────────────────────────────
let dragLid = null, dragSid = null;

function initLinkDrag(container, sid) {
  container.querySelectorAll('.link-item').forEach(el => {
    const handle = el.querySelector('.link-drag');
    if (!handle) return;

    handle.addEventListener('mousedown', () => { el.draggable = true; });
    handle.addEventListener('mouseup',   () => { el.draggable = false; });

    el.addEventListener('dragstart', e => {
      dragLid = parseInt(el.dataset.lid);
      dragSid = parseInt(el.dataset.sid);
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', e => {
      el.draggable = false;
      el.classList.remove('dragging');
      container.querySelectorAll('.link-item').forEach(x => x.classList.remove('drag-over'));
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      container.querySelectorAll('.link-item').forEach(x => x.classList.remove('drag-over'));
      el.classList.add('drag-over');
    });
    el.addEventListener('drop', async e => {
      e.preventDefault();
      const targetLid = parseInt(el.dataset.lid);
      if (dragLid === targetLid) return;
      el.classList.remove('drag-over');
      await api('POST', `/api/sections/${dragSid}/links/reorder`, {
        drag_id: dragLid, target_id: targetLid
      });
      reloadSection(dragSid);
    });
  });
}

async function reloadSection(sid) {
  const sections = await api('GET', '/api/sections');
  const s = sections.find(s => s.id === sid);
  if (!s) return;
  const container = document.getElementById(`links-${sid}`);
  if (!container) return;
  container.innerHTML = s.links.map(l => `
    <a class="link-item" href="${l.url}" target="_blank" draggable="false" data-lid="${l.id}" data-sid="${s.id}" onclick="if(editMode){event.preventDefault();return false;}">
      <div class="link-drag edit-only" title="Перетащить">⠿</div>
      <div class="link-icon" id="icon-${l.id}" onclick="if(editMode){openIconPicker(event,${l.id});event.preventDefault();event.stopPropagation();return false;}">
        <span class="icon-fallback">${l.icon||l.name.slice(0,2).toUpperCase()}</span>
      </div>
      <div class="link-name">${l.name}</div>
      <div class="link-url">${shortUrl(l.url)}</div>
      <div class="link-status" data-url="${l.url}"></div>
      <button class="link-edit" data-lid="${l.id}" data-name="${l.name.replace(/"/g,'&quot;')}" data-url="${l.url.replace(/"/g,'&quot;')}" onmousedown="editLinkBtn(event,this)" title="Редактировать" style="position:relative;z-index:10;">✎</button>
      <button class="link-del" onmousedown="deleteLink(event,${l.id})" title="Удалить">×</button>
    </a>`).join('');
  initLinkDrag(container, sid);
  if(s.links) loadFavicons(s.links);
}

function editLinkBtn(e, btn) {
  e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
  const lid = btn.dataset.lid;
  const name = btn.dataset.name;
  const url = btn.dataset.url;
  editLink(e, lid, name, url);
}

function editLink(e, lid, name, url) {
  e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
  openModal('Редактировать ссылку', false, true, true, name, url, 'accent', async () => {
    const newName = document.getElementById('modal-name').value.trim();
    const newUrl  = document.getElementById('modal-url').value.trim();
    if (!newName || !newUrl) return;
    closeModal();
    // Обновляем UI мгновенно
    const linkEl = document.querySelector('[data-lid="'+lid+'"]');
    if (linkEl) {
      linkEl.href = newUrl;
      const nameEl = linkEl.querySelector('.link-name');
      const urlEl  = linkEl.querySelector('.link-url');
      if (nameEl) nameEl.textContent = newName;
      if (urlEl)  urlEl.textContent  = shortUrl(newUrl);
    }
    // Сохраняем в фоне
    api('PUT', '/api/links/'+lid, {name: newName, url: newUrl});
  });
}

async function deleteLink(e,lid){
  e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
  await api('DELETE',`/api/links/${lid}`);
  e.target.closest('a').remove();
}

// ── Add system widget (multiple instances) ────────────
const widgetBuilders = {
  weather:  { build: buildWeatherWidget,  label: 'Погода',    w:6, h:3, minW:3, minH:2 },
  calendar: { build: buildCalendarWidget, label: 'Календарь', w:3, h:5, minW:2, minH:3 },
  notes:    { build: buildNotesWidget,    label: 'Заметки',   w:3, h:4, minW:2, minH:2 },
  todos:    { build: buildTodosWidget,    label: 'Задачи',    w:3, h:5, minW:2, minH:2 },
};

async function addSystemWidget(type, label) {
  document.getElementById('add-menu').style.display = 'none';
  const wid = `${type}-${Date.now()}`;

  // Сначала ищем в плагинах Dashboard.widgets, потом в widgetBuilders
  const pluginDef = Dashboard.widgets[type];
  if (pluginDef) {
    const items = grid.save(false);
    const maxY = items.reduce((m,i) => Math.max(m, (i.y||0)+(i.h||2)), 0);
    await api('POST', '/api/widgets', {id: wid, x: 0, y: maxY, w: pluginDef.defaultW, h: pluginDef.defaultH, min_w: pluginDef.minW, min_h: pluginDef.minH, type});
    grid.addWidget({
      id: wid, x: 0, y: maxY, w: pluginDef.defaultW, h: pluginDef.defaultH,
      minW: pluginDef.minW, minH: pluginDef.minH,
      content: pluginDef.build(wid, {})
    });
    setTimeout(() => pluginDef.init && pluginDef.init(wid, {}), 100);
    return;
  }

  const cfg = widgetBuilders[type];
  if (!cfg) return;

  // Find free Y position
  const items = grid.save(false);
  const maxY = items.reduce((m,i) => Math.max(m, (i.y||0)+(i.h||2)), 0);

  // Register in DB
  await api('POST', '/api/widgets', {id: wid, x: 0, y: maxY, w: cfg.w, h: cfg.h, min_w: cfg.minW, min_h: cfg.minH, type: type});

  grid.addWidget({
    id: wid, x: 0, y: maxY, w: cfg.w, h: cfg.h, minW: cfg.minW, minH: cfg.minH,
    content: cfg.build(wid)
  });

  // Init widget internals
  setTimeout(()=>{
    if (type === 'weather') { loadWeatherWidget(wid); addWeatherSettingsBtn(wid); }
    if (type === 'calendar') renderCalWidget(wid);
    if (type === 'notes') loadNotesWidget(wid);
    if (type === 'todos') loadTodosWidget(wid);
  }, 100);
}

// ── Icon picker ───────────────────────────────────────
let _iconPickerLid = null;
let _iconSearchTimer = null;

function openIconPicker(e, lid) {
  if (!editMode) return;
  e.preventDefault(); e.stopPropagation();
  _iconPickerLid = lid;
  const picker = document.getElementById('icon-picker');
  const rect = e.target.getBoundingClientRect();
  picker.style.display = 'block';
  picker.style.left = Math.min(rect.left, window.innerWidth - 300) + 'px';
  picker.style.top = (rect.bottom + 6) + 'px';
  document.getElementById('icon-search').value = '';
  document.getElementById('icon-results').innerHTML = '<span class="icon-picker-empty">загрузка...</span>';
  setTimeout(() => document.getElementById('icon-search').focus(), 50);
  // Сразу показываем популярные иконки
  loadIconResults('');
}

function closeIconPicker() {
  document.getElementById('icon-picker').style.display = 'none';
  _iconPickerLid = null;
}

document.addEventListener('click', e => {
  if (!e.target.closest('#icon-picker') && !e.target.closest('.link-icon')) {
    closeIconPicker();
  }
});

document.getElementById('icon-search').addEventListener('input', function() {
  clearTimeout(_iconSearchTimer);
  const q = this.value.trim();
  clearTimeout(_iconSearchTimer);
  _iconSearchTimer = setTimeout(() => loadIconResults(q), 200);
});

async function loadIconResults(q) {
  {
    const results = await api('GET', '/api/icons/search?q=' + encodeURIComponent(q));
    const box = document.getElementById('icon-results');
    if (!results.length) {
      box.innerHTML = '<span class="icon-picker-empty">Ничего не найдено</span>';
      return;
    }
    box.innerHTML = results.map(name => `
      <div class="icon-result" title="${name}" onclick="selectIcon('${name}')">
        <img src="/api/icons/${name}.png" onerror="this.parentNode.style.display='none'"/>
      </div>`).join('');
  }
}

document.getElementById('icon-search').addEventListener('keydown', e => {
  if (e.key === 'Escape') closeIconPicker();
});

async function selectIcon(name) {
  if (!_iconPickerLid) return;
  // Save icon to DB
  const lid = _iconPickerLid;
  closeIconPicker();
  // Get current link data
  const el = document.querySelector(`[data-lid="${lid}"]`);
  if (!el) return;
  const linkName = el.querySelector('.link-name')?.textContent || '';
  const linkUrl = el.href || '';
  await api('PUT', `/api/links/${lid}`, {name: linkName, url: linkUrl, icon: name});
  // Update icon display
  const iconEl = document.getElementById('icon-' + lid);
  if (iconEl) {
    iconEl.innerHTML = `<img src="/api/icons/${name}.png" width="16" height="16" style="border-radius:2px;display:block;">`;
  }
}

  // Init link drag on all sections
  document.querySelectorAll('[id^="links-"]').forEach(container => {
    const sid = parseInt(container.id.replace('links-',''));
    initLinkDrag(container, sid);
  });
  });
})();
</script>
